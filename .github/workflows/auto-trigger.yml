name: Auto Contribution Trigger

on:
  schedule:
    # Runs every hour, every day. The Python script decides internally
    # whether *this* hour is the randomly chosen "slot" for today.
    - cron: '0 * * * *'
  workflow_dispatch: {}   # lets you also run it manually from the Actions tab to test

jobs:
  maybe-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scheduled trigger check
        env:
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OFF_DAYS: ${{ vars.OFF_DAYS }}
          MIN_HOUR: ${{ vars.MIN_HOUR }}
          MAX_HOUR: ${{ vars.MAX_HOUR }}
        run: python scripts/auto_trigger.py

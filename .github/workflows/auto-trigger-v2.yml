name: Auto Contribution Trigger

on:
  schedule:
    # Every 30 minutes. The script itself decides how many (if any) commits
    # to make this run, based on today's target and how many are done so far.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab to test

permissions:
  contents: write   # needed so the workflow can commit its own state file back to this repo

jobs:
  maybe-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scheduled trigger check
        env:
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OFF_DAYS: ${{ vars.OFF_DAYS }}
          MIN_HOUR: ${{ vars.MIN_HOUR }}
          MAX_HOUR: ${{ vars.MAX_HOUR }}
          MIN_COMMITS: ${{ vars.MIN_COMMITS }}
          MAX_COMMITS: ${{ vars.MAX_COMMITS }}
          MAX_PER_RUN: ${{ vars.MAX_PER_RUN }}
        run: python scripts/auto_trigger_v2.py

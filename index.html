<style>
  :root{
    --bg1:#000000; --bg2:#141414;
    --glass:rgba(255,255,255,0.055); --glass-strong:rgba(255,255,255,0.09); --glass-border:rgba(255,255,255,0.10);
    --text:#f7f7f7; --muted:#8f8f95; --muted2:#6b6b70;
    --accent:#ffffff; --danger:#ff6b6b; --good:#7ee8a3;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overscroll-behavior:none;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% 0%, rgba(255,255,255,0.06), transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(255,255,255,0.04), transparent 45%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    min-height:100vh;
    padding-top:calc(var(--safe-top) + 0px);
    padding-bottom:calc(var(--safe-bottom) + 24px);
  }
  .topbar{
    position:sticky; top:0; z-index:20;
    padding:calc(var(--safe-top) + 14px) 20px 14px;
    background:rgba(10,10,10,0.72);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border-bottom:1px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; gap:12px;
  }
  .app-icon{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(145deg,#fff,#c9c9c9);
    display:flex;align-items:center;justify-content:center;
    font-size:18px; box-shadow:0 4px 14px rgba(255,255,255,0.15);
    flex-shrink:0;
  }
  .topbar h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-0.01em;}
  .topbar .sub{color:var(--muted);font-size:11.5px;margin:1px 0 0;}
  .content{padding:16px 16px 4px;max-width:640px;margin:0 auto;}

  .tabs{display:flex;gap:6px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:4px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:10px 0;border-radius:11px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
  .tab.active{background:#fff;color:#0a0a0a;}

  .card{
    background:var(--glass);
    backdrop-filter:blur(22px) saturate(150%);
    -webkit-backdrop-filter:blur(22px) saturate(150%);
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted2);font-weight:700;margin:0 0 12px;}
  label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500;}
  input{
    width:100%;padding:13px 14px;border-radius:13px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.045);
    color:var(--text);font-size:15px;margin-bottom:12px;
    outline:none; transition:border-color .2s, background .2s;
    appearance:none;
    -webkit-appearance:none;
  }
  input:focus{border-color:rgba(255,255,255,0.35); background:rgba(255,255,255,0.07);}
  input::placeholder{color:var(--muted2);}

  button{
    width:100%;padding:16px;border-radius:16px;border:1px solid transparent;
    font-size:15px;font-weight:650;cursor:pointer;margin-bottom:10px;
    transition:transform .1s ease, opacity .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  button:active{transform:scale(0.965); opacity:0.9;}
  .btn-primary{background:#ffffff;color:#0a0a0a;box-shadow:0 6px 18px rgba(255,255,255,0.12);}
  .btn-secondary{background:var(--glass-strong);color:var(--text);border:1px solid var(--glass-border);}
  .btn-good{background:#e9fff0;color:#0a2e17;}
  .btn-danger-outline{background:transparent;border:1px solid rgba(255,107,107,0.4);color:var(--danger);}
  .btn-flat{background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--muted);}
  .btn-icon{font-size:17px;}

  pre{
    background:rgba(0,0,0,0.5);padding:13px;border-radius:14px;
    overflow-x:auto;font-size:12px;white-space:pre-wrap;word-break:break-word;
    border:1px solid rgba(255,255,255,0.08); max-height:340px; overflow-y:auto;
    font-family:'SF Mono',Menlo,Consolas,monospace;
  }
  .row{display:flex;gap:10px;}
  .row>button{flex:1;}

  .log-item{
    display:flex;gap:12px;align-items:flex-start;
    border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 0;font-size:13px;
  }
  .log-item:last-child{border-bottom:none;}
  .log-dot{width:8px;height:8px;border-radius:50%;background:var(--good);margin-top:5px;flex-shrink:0;}
  .log-repo{color:var(--text);font-weight:700;display:block;}
  .log-desc{color:var(--muted);font-size:12.5px;}
  .log-time{color:var(--muted2);font-size:11px;margin-top:3px;}
  .muted{color:var(--muted);font-size:12.5px;}
  .hidden{display:none !important;}
  .spinner-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:22px 0;color:var(--muted);font-size:13px;}
  .spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);border-top-color:#fff;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .err{color:var(--danger);font-size:13.5px;line-height:1.5;}
  .ok{color:var(--good);font-size:13.5px;font-weight:600;}
  .empty-state{text-align:center;color:var(--muted2);font-size:13px;padding:20px 0;}

  /* Bottom sheet modal */
  .sheet-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
    z-index:40; opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .sheet-backdrop.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:41;
    background:#141414;
    border-top:1px solid rgba(255,255,255,0.12);
    border-radius:24px 24px 0 0;
    padding:10px 18px calc(var(--safe-bottom) + 18px);
    max-height:82vh; overflow-y:auto;
    transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -10px 40px rgba(0,0,0,0.6);
  }
  .sheet.show{transform:translateY(0);}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.25);margin:6px auto 14px;}
  .sheet-title{font-size:16px;font-weight:700;margin-bottom:2px;}
  .sheet-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;}
  .file-chip{
    display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;padding:4px 10px;font-size:11.5px;font-family:'SF Mono',Menlo,monospace;
    margin:0 6px 8px 0; color:var(--muted);
  }
  .file-chip.active{background:#fff;color:#0a0a0a;border-color:#fff;}
</style>
</head>
<body>

<!-- Bottom sheet for preview/approve -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="cancelAction()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Preview</div>
  <div class="sheet-sub" id="sheetSub"></div>
  <div id="sheetFiles"></div>
  <pre id="previewBody"></pre>
  <div class="row" style="margin-top:8px;">
    <button class="btn-good" onclick="approveAction()"><span class="btn-icon">✅</span> Approve & Commit</button>

<script>
const API = "https://api.github.com";
let pending = null;
let currentFileKey = null;

function switchTab(name){
  document.getElementById('viewHome').classList.toggle('hidden', name!=='home');
  document.getElementById('viewHistory').classList.toggle('hidden', name!=='history');
  document.getElementById('viewSetup').classList.toggle('hidden', name!=='setup');
  document.getElementById('tabHome').classList.toggle('active', name==='home');
  document.getElementById('tabHistory').classList.toggle('active', name==='history');
  document.getElementById('tabSetup').classList.toggle('active', name==='setup');
  if(name==='history') renderHistory();
}

function cfg(){ return { user: localStorage.getItem('gh_user')||'', token: localStorage.getItem('gh_token')||'', groq: localStorage.getItem('groq_key')||'' }; }
function saveConfig(){
  localStorage.setItem('gh_user', document.getElementById('ghUser').value.trim());
  localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
  localStorage.setItem('groq_key', document.getElementById('groqKey').value.trim());
  document.getElementById('configStatus').innerHTML = '<span class="ok">Saved ✓</span> — stored only in this browser.';
}
(function initFields(){
  const c = cfg();
  document.getElementById('ghUser').value = c.user;
  document.getElementById('ghToken').value = c.token;
  document.getElementById('groqKey').value = c.groq;
  if(!c.user || !c.token) switchTab('setup');
})();

function authHeaders(){
  const c = cfg();
  return { 'Authorization': 'token ' + c.token, 'Accept': 'application/vnd.github+json' };
}
function setStatus(html){ document.getElementById('statusCard').innerHTML = html; }
function spinner(msg){ return `<div class="spinner-wrap"><div class="spin"></div>${msg}</div>`; }
function b64EncodeUnicode(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64DecodeUnicode(str){ return decodeURIComponent(escape(atob(str))); }

async function fetchRepos(){
  const c = cfg();
  if(!c.token || !c.user) throw new Error("Missing username or token — go to Setup, enter both, and tap Save Config.");
  let res;
  try{
    res = await fetch(`${API}/user/repos?per_page=100&affiliation=owner`, {headers: authHeaders()});
  } catch(e){
    throw new Error("Network/CORS error reaching GitHub. Open this app via its hosted https:// URL (GitHub Pages), not as a local file, especially on mobile.");
  }
  if(res.status === 401) throw new Error("401 Bad credentials — token invalid/expired. Generate a new classic token with 'repo' scope.");
  if(!res.ok) throw new Error(`GitHub API error ${res.status}: ${await res.text()}`);
  const repos = await res.json();
  return repos.filter(r => !r.archived);
}

async function getFile(owner, repo, path){
  const res = await fetch(`${API}/repos/${owner}/${repo}/contents/${path}`, {headers: authHeaders()});
  if(res.status === 404) return null;
  if(!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
  const data = await res.json();
  return { sha: data.sha, content: b64DecodeUnicode(data.content.replace(/\n/g,'')) };
}
async function putFile(owner, repo, path, content, message, sha){
  const body = { message, content: b64EncodeUnicode(content) };
  if(sha) body.sha = sha;
  const res = await fetch(`${API}/repos/${owner}/${repo}/contents/${path}`, {
    method: 'PUT', headers: {...authHeaders(), 'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if(!res.ok){ const t = await res.text(); throw new Error("Commit failed: " + t); }
  return res.json();
}

// ---------- README micro-task templates ----------
const TYPOS = {"teh ":"the ","wich ":"which ","occured":"occurred","seperate":"separate","recieve":"receive","adress":"address","untill":"until","alot ":"a lot ","thier ":"their "};
function taskTypoFix(readme){
  for(const [wrong, right] of Object.entries(TYPOS)){
    if(readme.includes(wrong)) return { newContent: readme.replace(wrong, right), description: `docs: correct terminology in documentation` };
  }
  return null;
}
function taskAddBadges(readme){
  if(readme.includes('shields.io')) return null;
  const badge = `![Python](https://img.shields.io/badge/python-3.x-blue.svg)`;
  const lines = readme.split('\n');
  let insertAt = lines[0] && lines[0].startsWith('#') ? 1 : 0;
  lines.splice(insertAt, 0, '', badge);
  return { newContent: lines.join('\n'), description: 'docs: add technology badges to project header' };
}
function taskAddRequirementsSection(readme){
  if(/##\s*Requirements/i.test(readme)) return null;
  return { newContent: readme + `\n\n## Requirements\n\n\`\`\`\npip install -r requirements.txt\n\`\`\`\n`, description: 'docs: document installation requirements' };
}
function taskLastUpdated(readme){
  const dateStr = new Date().toISOString().split('T')[0];
  const marker = /\*\*Last updated:\*\* .*/;
  if(marker.test(readme)) return { newContent: readme.replace(marker, `**Last updated:** ${dateStr}`), description: `chore: update maintenance timestamp` };
  return { newContent: readme + `\n\n---\n**Last updated:** ${dateStr}\n`, description: `chore: add maintenance timestamp footer` };
}
const README_TASKS = [taskTypoFix, taskAddBadges, taskAddRequirementsSection, taskLastUpdated];

async function taskGitignore(owner, repo){
  const existing = await getFile(owner, repo, '.gitignore');
  const standard = ['__pycache__/','*.pyc','.env','venv/','.DS_Store','*.log','.ipynb_checkpoints/'];
  if(!existing) return { path:'.gitignore', sha:null, newContent: standard.join('\n')+'\n', description: 'chore: standardize .gitignore for Python tooling' };
  const missing = standard.filter(e => !existing.content.includes(e));
  if(missing.length === 0) return null;
  return { path:'.gitignore', sha: existing.sha, newContent: existing.content.trimEnd()+'\n'+missing.join('\n')+'\n', description: `chore: extend .gitignore with standard exclusions` };
}

async function runTrigger(){
  setStatus(spinner('Fetching repos…'));
  try{
    const repos = await fetchRepos();
    if(repos.length === 0){ setStatus('<div class="muted">No repos found on this account.</div>'); return; }
    const repo = repos[Math.floor(Math.random()*repos.length)];
    const owner = repo.owner.login;
    const tryGitignoreFirst = Math.random() < 0.3;
    let result = null;
    if(tryGitignoreFirst){
      result = await taskGitignore(owner, repo.name);
      if(result) pending = { type:'file', owner, repo: repo.name, path: result.path, sha: result.sha, newContent: result.newContent, message: result.description, description: result.description };
    }
    if(!result){
      const readmeFile = await getFile(owner, repo.name, 'README.md');
      if(!readmeFile){ setStatus(`<div class="muted">⚠️ ${repo.name} has no README.md. Tap Trigger again for another repo.</div>`); return; }
      const shuffled = README_TASKS.slice().sort(()=>Math.random()-0.5);
      let taskResult = null;
      for(const fn of shuffled){ taskResult = fn(readmeFile.content); if(taskResult) break; }
      if(!taskResult){ setStatus('<div class="muted">⚠️ No applicable edits found. Tap Trigger again.</div>'); return; }
      pending = { type:'file', owner, repo: repo.name, path:'README.md', sha: readmeFile.sha, newContent: taskResult.newContent, message: taskResult.description, description: taskResult.description };
    }
    setStatus('');
    showFilePreview();
  } catch(e){ setStatus('<div class="err">❌ ' + e.message + '</div>'); }
}

function openSheet(){ document.getElementById('sheetBackdrop').classList.add('show'); document.getElementById('sheet').classList.add('show'); }
function closeSheet(){ document.getElementById('sheetBackdrop').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); }

function showFilePreview(){
  document.getElementById('sheetTitle').innerText = pending.repo;
  document.getElementById('sheetSub').innerText = `${pending.path} — ${pending.description}`;
  document.getElementById('sheetFiles').innerHTML = '';
  const body = pending.newContent.length > 2000 ? pending.newContent.slice(0,2000)+'\n…' : pending.newContent;
  document.getElementById('previewBody').innerText = body;
  openSheet();
}
function cancelAction(){ pending=null; closeSheet(); }

async function approveAction(){
  if(!pending) return;
  closeSheet();
  setStatus(spinner('Committing…'));
  try{
    if(pending.type === 'file'){
      await putFile(pending.owner, pending.repo, pending.path, pending.newContent, pending.message, pending.sha);
      logAction(pending.repo, pending.description);
      setStatus(`<div class="ok">✅ Committed to ${pending.repo}</div>`);
    } else if(pending.type === 'scaffold'){
      setStatus(spinner('Creating repo & pushing files…'));
      await createRepoAndFiles(pending);
      logAction(pending.repoName, `Scaffolded new project: ${pending.title}`);
      setStatus(`<div class="ok">✅ Created repo ${pending.repoName}</div>`);
    }
  } catch(e){ setStatus('<div class="err">❌ ' + e.message + '</div>'); }
  pending = null;
}

// ---------- Medium-complexity multi-file scaffold projects ----------
const PROJECTS = [
{
  slug: 'cli-expense-tracker',
  title: 'CLI Expense Tracker',
  desc: 'A command-line personal expense tracker with categories, JSON persistence, and monthly summaries.',
  files: {
    'main.py': `import sys\nfrom storage import ExpenseStore\nfrom models import Expense\n\ndef print_help():\n    print("""\nExpense Tracker CLI\n-------------------\nCommands:\n  add <amount> <category> <description>\n  list\n  summary\n  delete <id>\n""")\n\ndef main():\n    store = ExpenseStore("expenses.json")\n    args = sys.argv[1:]\n\n    if not args or args[0] == "help":\n        print_help()\n        return\n\n    command = args[0]\n\n    if command == "add" and len(args) >= 4:\n        amount = float(args[1])\n        category = args[2]\n        description = " ".join(args[3:])\n        expense = Expense(amount=amount, category=category, description=description)\n        store.add(expense)\n        print(f"Added: {expense}")\n\n    elif command == "list":\n        for e in store.all():\n            print(e)\n\n    elif command == "summary":\n        totals = store.summary_by_category()\n        for category, total in totals.items():\n            print(f"{category:15s} \${total:.2f}")\n        print(f"{'TOTAL':15s} \${sum(totals.values()):.2f}")\n\n    elif command == "delete" and len(args) == 2:\n        store.delete(int(args[1]))\n        print(f"Deleted expense #{args[1]}")\n\n    else:\n        print_help()\n\nif __name__ == "__main__":\n    main()\n`,
    'models.py': `from dataclasses import dataclass, field\nfrom datetime import datetime\n\n@dataclass\nclass Expense:\n    amount: float\n    category: str\n    description: str\n    id: int = 0\n    date: str = field(default_factory=lambda: datetime.now().strftime("%Y-%m-%d"))\n\n    def to_dict(self):\n        return {\n            "id": self.id,\n            "amount": self.amount,\n            "category": self.category,\n            "description": self.description,\n            "date": self.date,\n        }\n\n    @staticmethod\n    def from_dict(data):\n        return Expense(\n            amount=data["amount"],\n            category=data["category"],\n            description=data["description"],\n            id=data.get("id", 0),\n            date=data.get("date", ""),\n        )\n\n    def __str__(self):\n        return f"#{self.id:03d} [{self.date}] {self.category:12s} \${self.amount:8.2f}  {self.description}"\n`,

async function runScaffold(){
  const proj = PROJECTS[Math.floor(Math.random()*PROJECTS.length)];
  const suffix = Math.random().toString(36).slice(2,6);
  const repoName = `${proj.slug}-${suffix}`;
  pending = { type:'scaffold', repoName, title: proj.title, desc: proj.desc, files: proj.files };
  showScaffoldPreview();
}

function showScaffoldPreview(){
  const fileKeys = Object.keys(pending.files);
  currentFileKey = fileKeys[0];
  document.getElementById('sheetTitle').innerText = pending.repoName;
  document.getElementById('sheetSub').innerText = pending.desc;
  const chips = fileKeys.map(k => `<span class="file-chip ${k===currentFileKey?'active':''}" data-key="${k}" onclick="selectScaffoldFile('${k}')">${k}</span>`).join('');
  document.getElementById('sheetFiles').innerHTML = chips;
  renderScaffoldFile();
  openSheet();
}
function selectScaffoldFile(key){
  currentFileKey = key;
  document.querySelectorAll('.file-chip').forEach(el => el.classList.toggle('active', el.dataset.key === key));
  renderScaffoldFile();
}
function renderScaffoldFile(){
  const content = pending.files[currentFileKey];
  const body = content.length > 2000 ? content.slice(0,2000)+'\n…' : content;
  document.getElementById('previewBody').innerText = body;
}

function commitMessageForPath(path){
  const lower = path.toLowerCase();
  if(lower.endsWith('readme.md')) return 'docs: add comprehensive project documentation';
  if(lower.includes('test')) return 'test: add unit test coverage';
  if(lower.endsWith('requirements.txt')) return 'chore: define project dependencies';
  if(lower.endsWith('.json')) return 'feat: add configuration/data assets';
  if(lower.includes('example') || lower.includes('sample') || lower.includes('demo')) return 'docs: add usage examples';
  if(lower.endsWith('.py')) return `feat: implement ${path.split('/').pop().replace('.py','').replace(/_/g,' ')} module`;
  return `feat: add ${path}`;
}

async function createRepoAndFiles(p){
  const c = cfg();
  if(!c.token || !c.user) throw new Error("Missing username or token — go to Setup and Save Config.");
  let res;
  try{
    res = await fetch(`${API}/user/repos`, {
      method:'POST', headers:{...authHeaders(),'Content-Type':'application/json'},
      body: JSON.stringify({ name: p.repoName, description: p.desc, private: false, auto_init: true })
    });
  } catch(e){
    throw new Error("Network/CORS error reaching GitHub. Open this app via its hosted https:// URL, not as a local file.");
  }
  if(res.status === 401) throw new Error("401 Bad credentials — token invalid/expired.");
  if(res.status === 422) throw new Error("Repo name already exists — tap Scaffold again for a new random name.");
  if(!res.ok){ const t = await res.text(); throw new Error(`Repo creation failed (${res.status}): ${t}`); }
  const repoData = await res.json();
  const owner = repoData.owner.login;
  await new Promise(r=>setTimeout(r, 1500));
  for(const [path, content] of Object.entries(p.files)){
    const existing = await getFile(owner, p.repoName, path);
    await putFile(owner, p.repoName, path, content, commitMessageForPath(path), existing ? existing.sha : null);
  }
}

// ---------- AI-generated projects via Groq ----------
const AI_THEMES = {
  aiera_cad: {
    label: 'AIERA CAD module',
    context: `AIERA CAD is an AI-powered architectural assistant that transforms furniture photos into precise 2D CAD-style technical drawings and orthographic blueprints, for architects and designers. Users upload a furniture image, generate renderings from specific angles (isometric, front, perspective), then convert designs into clean minimal line drawings. It has project history tracking, a visual workspace, and the ability to reference prior iterations as design guides. Relevant technical sub-domains: image skeletonization, computer vision edge/contour detection, threshold and binarization analysis, orthographic projection math, line simplification/vectorization, DXF/SVG export.`
  },
  aiera_creative: {
    label: 'Aiera Creative AI module',
    context: `Aiera Creative AI Automator is a visual-first presentation designer and strategic slide generator for startups, agencies, and enterprises. It converts raw ideas, outlines, or briefs into bespoke high-contrast visual slide compositions using bento grids, KPI dashboards, interactive process flows, dynamic metrics, and editorial layouts. Relevant technical sub-domains: LLM prompt orchestration and chaining, structured JSON layout generation, design-logic/constraint solving for grid layouts, content-to-visual mapping, template scoring/ranking.`
  },
  surprise: {
    label: 'Surprise me',
    context: `Pick either the AIERA CAD (furniture photo to CAD blueprint tool, using computer vision: skeletonization, contour/edge detection, thresholding, orthographic projection) or the Aiera Creative AI Automator (LLM-driven slide/presentation generator using bento grids, KPI dashboards, layout logic) — whichever gives a more interesting standalone submodule this time.`
  }
};

function openAIThemePicker(){
  document.getElementById('sheetTitle').innerText = 'Generate an AI project';
  document.getElementById('sheetSub').innerText = 'Pick a theme — a new real submodule will be generated';
  document.getElementById('previewBody').innerText = '';
  const chips = Object.entries(AI_THEMES).map(([key, t]) =>
    `<button class="btn-secondary" style="margin-bottom:8px;" onclick="pickAITheme('${key}')">${t.label}</button>`
  ).join('');
  document.getElementById('sheetFiles').innerHTML = `<div>${chips}</div>`;
  openSheet();
}

async function pickAITheme(themeKey){
  const c = cfg();
  if(!c.groq){
    document.getElementById('sheetFiles').innerHTML = '<div class="err">Missing Groq API key — go to Setup, paste it, tap Save Config.</div>';
    return;
  }
  document.getElementById('sheetFiles').innerHTML = '';
  document.getElementById('previewBody').innerHTML = '';
  document.getElementById('sheetSub').innerText = 'Generating with AI…';
  document.getElementById('previewBody').outerHTML = '<div id="previewBody" class="spinner-wrap"><div class="spin"></div>Thinking up a project…</div>';

  try{
    const theme = AI_THEMES[themeKey];
    const project = await generateAIProject(theme.context);
    const pb = document.getElementById('previewBody');
    if(pb && pb.tagName !== 'PRE') pb.outerHTML = '<pre id="previewBody"></pre>';
    pending = { type:'scaffold', repoName: project.repoName, title: project.title, desc: project.description, files: project.files };
    showScaffoldPreview();
  } catch(e){
    document.getElementById('sheetFiles').innerHTML = `<div class="err">❌ ${e.message}</div>`;
    const pb = document.getElementById('previewBody');
    if(pb) pb.outerHTML = '<pre id="previewBody"></pre>';
  }
}

async function generateAIProject(themeContext){
  const c = cfg();
  const systemPrompt = `You are a senior staff engineer producing production-grade, portfolio-quality open-source submodules for a real company's tech stack. You always respond with STRICT JSON ONLY — no markdown fences, no commentary before or after, no explanation. The JSON schema is exactly:
{
  "repoName": "kebab-case-short-name",
  "title": "Human readable title",
  "description": "One to two sentence description",
  "files": {
    "README.md": "...",
    "src/<module>.py": "...",
    "src/<module2>.py": "...",
    "src/<module3>.py": "...",
    "tests/test_<module>.py": "...",
    "tests/test_<module2>.py": "...",
    "examples/<usecase>.py": "...",
    "examples/<usecase2>.py": "...",
    "requirements.txt": "..."
  }
}

HARD REQUIREMENTS — do not skip any of these:

1. SCOPE: This must read as a genuine, non-trivial engineering submodule — not a toy script. Pick ONE specific technique from the given context (e.g. a specific CV algorithm, a specific LLM-orchestration pattern) and build a properly layered implementation around it: separate concerns across at least 3 substantial Python modules under src/ (e.g. core algorithm, data/IO handling, a pipeline/orchestrator class, a CLI or API entrypoint). Each module should be realistically sized (roughly 80-200 lines), with classes, type hints, docstrings, and real logic — not stubs, not "pass # TODO", not placeholder comments.

2. TESTS: Include at least 2 separate test files under tests/, using pytest style, each with multiple real test functions covering edge cases, not just a single happy-path assertion.

3. EXAMPLES: Include at least 2 example/demo scripts under examples/ showing different realistic use cases of the module (different inputs/configurations), fully runnable.

4. README.md must be long-form and genuinely comprehensive, written in rich GitHub-flavored Markdown, structured with these sections in order:
   - Title + 3-4 shields.io badges (python version, license, build status, code style)
   - One-paragraph elevator pitch
   - Table of Contents (anchor-linked)
   - ## Overview — the problem this solves and where it fits in the larger product
   - ## Tech Stack — bullet list of languages/libraries/techniques used and why each was chosen
   - ## Architecture — an ASCII or mermaid diagram of the module's internal structure/data flow, plus a written walkthrough
   - ## Theoretical Background — explain the underlying algorithm/technique (e.g. how skeletonization/thresholding works, or how the orchestration pattern works) in real technical depth, several paragraphs, as if written by someone who deeply understands the domain
   - ## Installation — pip install steps
   - ## Usage — at least 2 distinct, fully worked code examples with expected output
   - ## API Reference — document the main public classes/functions, params, return types
   - ## Case Studies — 2 short realistic scenarios describing how this submodule would be used in production within the larger product, with concrete before/after or input/output framing
   - ## Testing — how to run the test suite
   - ## Performance Considerations or Limitations
   - ## Roadmap — 4-6 realistic future items
   - ## License (MIT)

5. Code must be real, runnable Python using only standard library or common packages (numpy, opencv-python, pillow, requests, pydantic, dataclasses). No network calls that would fail in CI unless mocked in tests.

6. repoName must be lowercase kebab-case, concise, specific to the technique (not generic like "cad-tool").

7. Escape all newlines/quotes properly as valid JSON string content. The entire response must be one valid parseable JSON object, nothing else.`;

  const userPrompt = `Context: ${themeContext}\n\nInvent ONE new, specific, scoped, production-grade submodule right now, following every hard requirement in the system prompt exactly — especially the long-form README and the multi-module/multi-test/multi-example file structure. Go deep into a specific technique rather than building something generic.`;

  let res;
  try{
    res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + c.groq, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ],
        temperature: 0.9,
        max_tokens: 8000,
        response_format: { type: 'json_object' }
      })
    });
  } catch(e){
    throw new Error('Network error reaching Groq. Check your connection and API key.');
  }
  if(res.status === 401) throw new Error('401 from Groq — invalid API key. Check Setup.');
  if(!res.ok){ const t = await res.text(); throw new Error(`Groq API error ${res.status}: ${t.slice(0,200)}`); }

  const data = await res.json();
  const finishReason = data.choices[0].finish_reason;
  const raw = data.choices[0].message.content;
  let project;
  try{
    project = JSON.parse(raw);
  } catch(e){
    if(finishReason === 'length') throw new Error('Groq response was cut off before completing (too large). Try again — it usually succeeds on a retry.');
    throw new Error('Groq returned invalid JSON. Try again.');
  }
  if(!project.repoName || !project.files || Object.keys(project.files).length === 0){
    throw new Error('Groq response missing required fields. Try again.');
  }
  const suffix = Math.random().toString(36).slice(2,6);
  project.repoName = project.repoName.toLowerCase().replace(/[^a-z0-9-]/g,'-') + '-' + suffix;
  return project;
}

// ---------- History ----------
function logAction(repo, desc){
  const history = JSON.parse(localStorage.getItem('gh_history')||'[]');
  history.unshift({ repo, desc, time: new Date().toLocaleString() });
  localStorage.setItem('gh_history', JSON.stringify(history.slice(0,50)));
}
function renderHistory(){
  const history = JSON.parse(localStorage.getItem('gh_history')||'[]');
  const el = document.getElementById('historyList');
  if(history.length===0){ el.innerHTML = '<div class="empty-state">No actions yet — tap Trigger on Home.</div>'; return; }
  el.innerHTML = history.map(h => `
    <div class="log-item">
      <div class="log-dot"></div>
      <div>
        <span class="log-repo">${h.repo}</span>
        <div class="log-desc">${h.desc}</div>
        <div class="log-time">${h.time}</div>
      </div>
    </div>`).join('');
}
function clearHistory(){
  localStorage.removeItem('gh_history');
  renderHistory();
}
renderHistory();
